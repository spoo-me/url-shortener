<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spoo.me - Sign In</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #e5e5e5;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #999; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="spoo-ext-auth" data-code="{{ code }}"></div>
        <div class="spinner"></div>
        <p>Signing you in...</p>
        <p>You can close this tab once your app updates.</p>
    </div>
</body>
</html>
