<div id="authModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-section">
                    <h2 id="authTitle" class="modal-title">Sign in to Spoo.me</h2>
                    <p id="authSubtitle" class="modal-subtitle">Welcome back! Please sign in to continue</p>
                </div>
            </div>

            <div class="modal-body">
                <!-- OAuth Section -->
                <div class="oauth-section">
                    <button type="button" class="oauth-btn" onclick="loginWithGoogle()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        <span>Google</span>
                    </button>

                    <button type="button" class="oauth-btn" onclick="loginWithGitHub()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                        </svg>
                        <span>GitHub</span>
                    </button>

                    <button type="button" class="oauth-btn" onclick="loginWithDiscord()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026 13.83 13.83 0 0 0 1.226-1.963.074.074 0 0 0-.041-.104c-.652-.244-1.272-.549-1.872-.892a.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.246.195.372.288a.075.075 0 0 1-.006.125c-.601.344-1.22.649-1.873.892a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z" />
                        </svg>
                        <span>Discord</span>
                    </button>
                </div>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <!-- Email/Password Form -->
                <form id="authForm" onsubmit="submitAuth(); return false;">
                    <div class="form-grid">
                        <div id="userNameRow" class="field">
                            <label for="authUserName">Display name</label>
                            <input type="text" id="authUserName" name="user_name" placeholder="Your display name"
                                autocomplete="name" />
                        </div>

                        <div class="field">
                            <label for="authEmail">Email address</label>
                            <input type="email" id="authEmail" name="email" placeholder="Enter your email address"
                                autocomplete="email" required />
                        </div>

                        <div class="field">
                            <label for="authPassword">Password</label>
                            <input type="password" id="authPassword" name="password" placeholder="At least 8 characters"
                                autocomplete="new-password" required />

                            <!-- Password Strength Indicator (only shown in register mode) -->
                            <div id="passwordStrengthContainer" class="password-strength-container"
                                style="display: none;">
                                <div class="password-strength-bar-container">
                                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                                </div>
                                <div class="password-strength-label" id="passwordStrengthLabel">Very Weak</div>
                            </div>

                            <!-- Password Requirements (only shown in register mode) -->
                            <ul id="passwordRequirements" class="password-requirements" style="display: none;"></ul>
                        </div>
                    </div>
                </form>
            </div>

            <div id="authError" class="auth-error" role="alert"></div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-primary" id="primaryBtn" form="authForm"
                    style="width: 100%; margin-bottom: 16px;">
                    <span>Register</span>
                </button>

                <div class="auth-toggle">
                    <span id="toggleText">Already have an account?</span>
                    <button type="button" onclick="toggleAuthMode()" id="toggleBtn">Login</button>
                </div>

                <div id="legalNotice" class="legal-notice" style="display: none;">
                    By continuing, you agree to our <a href="/terms-of-service" target="_blank">Terms of Service</a> and <a href="/privacy-policy" target="_blank">Privacy Policy</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authMode = 'login';

        function openAuthModal(mode = 'login') {
            setAuthMode(mode);
            if (typeof clearAuthError === 'function') {
                clearAuthError();
            }
            const modal = document.getElementById('authModal');
            modal.style.display = 'flex';
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
            setTimeout(() => document.getElementById('authUserName')?.focus(), 100);
        }

        function closeAuthModal() {
            const modal = document.getElementById('authModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.setAttribute('aria-hidden', 'true');
            }, 300);
        }

        function setAuthMode(mode) {
            authMode = mode;
            const isRegister = mode === 'register';

            document.getElementById('authTitle').textContent = isRegister ? 'Create your account' : 'Sign in to Spoo.me';
            document.getElementById('authSubtitle').textContent = isRegister ? 'Join spoo.me to manage your links' : 'Welcome back! Please sign in to continue';
            document.getElementById('userNameRow').style.display = isRegister ? 'block' : 'none';
            document.getElementById('primaryBtn').innerHTML = `<span>${isRegister ? 'Register' : 'Continue'}</span>`;
            document.getElementById('toggleText').textContent = isRegister ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('toggleBtn').textContent = isRegister ? 'Login' : 'Sign up';

            // Show/hide legal notice
            const legalNotice = document.getElementById('legalNotice');
            if (legalNotice) {
                legalNotice.style.display = isRegister ? 'block' : 'none';
            }

            // Show/hide password strength indicator and requirements
            const strengthContainer = document.getElementById('passwordStrengthContainer');
            const requirementsContainer = document.getElementById('passwordRequirements');

            if (!isRegister) {
                // Hide strength indicator in login mode
                if (strengthContainer) {
                    strengthContainer.style.display = 'none';
                }
                if (requirementsContainer) {
                    requirementsContainer.style.display = 'none';
                }
            }

            const pwd = document.getElementById('authPassword');
            if (pwd) {
                pwd.setAttribute('autocomplete', isRegister ? 'new-password' : 'current-password');
                // Initialize password strength if in register mode and there's a value
                if (isRegister && pwd.value && typeof updatePasswordStrength === 'function') {
                    updatePasswordStrength(pwd.value);
                } else if (!isRegister) {
                    // Clear password field when switching to login to avoid confusion
                    pwd.value = '';
                }
            }
        }

        function toggleAuthMode() {
            setAuthMode(authMode === 'register' ? 'login' : 'register');
            if (typeof clearAuthError === 'function') {
                clearAuthError();
            }
        }

        function clearAuthError() {
            const errorEl = document.getElementById('authError');
            errorEl.textContent = '';
            errorEl.style.display = 'none';
        }

        function _oauthUrl(provider) {
            const next = new URLSearchParams(window.location.search).get('next');
            return next ? `/oauth/${provider}?next=${encodeURIComponent(next)}` : `/oauth/${provider}`;
        }

        function loginWithGoogle() {
            closeAuthModal();
            window.location.href = _oauthUrl('google');
        }

        function loginWithGitHub() {
            closeAuthModal();
            window.location.href = _oauthUrl('github');
        }

        function loginWithDiscord() {
            closeAuthModal();
            window.location.href = _oauthUrl('discord');
        }

        // Close on overlay/backdrop click
        document.addEventListener('click', function (ev) {
            if (ev.target.classList.contains('modal-backdrop') || ev.target.id === 'authModal') {
                closeAuthModal();
            }
        });

        // Close on Escape
        document.addEventListener('keydown', function (ev) {
            if (ev.key === 'Escape') closeAuthModal();
        });

        // Auto-open modal when ?next= is in the URL (device auth flow)
        if (new URLSearchParams(window.location.search).has('next')) {
            openAuthModal('login');
        }
    </script>
</div>
