<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard | spoo.me{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nata+Sans:wght@100..900&display=swap" rel="stylesheet">

    <!-- Base styles -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard/dashboard-base.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', path='css/notifications.css') }}?v=1">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">

    <!-- Tippy.js for tooltips -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', path='images/favicon.png') }}">


    {% if sentry_client_key or clarity_id %}
    <script>
        addEventListener("load", function () {
            {% if sentry_client_key %}
            var s = document.createElement("script");
            s.src = "https://js.sentry-cdn.com/{{ sentry_client_key }}.min.js";
            s.crossOrigin = "anonymous";
            document.head.appendChild(s);
            {% endif %}
            {% if clarity_id %}
            (function (c, l, a, r, i, t, y) {
                c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
                t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
                y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
            })(window, document, "clarity", "script", "{{ clarity_id }}");
            {% endif %}
        });
    </script>
    {% endif %}

    {% block head_css %}{% endblock %}
</head>

<body class="dashboard-layout">
    <div class="dashboard-wrapper">
        <!-- Mobile Header with Hamburger Menu -->
        <header class="mobile-header">
            <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open menu">
                <i class="ti ti-menu-2"></i>
            </button>
            <a href="/" class="mobile-brand">
                <img src="{{ url_for('static', path='images/logo-text-dark.png') }}" alt="spoo.me" class="w-8 h-8">
                <!-- <span>spoo.me</span> -->
            </a>
        </header>

        {% include 'dashboard/partials/sidebar.html' %}

        <main class="dashboard-main">
            {% include 'dashboard/partials/verification_banner.html' %}
            <div class="dashboard-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Base scripts -->
    <script src="{{ url_for('static', path='js/notifications.js') }}?v=1"></script>
    <script src="{{ url_for('static', path='js/dashboard/dashboard-base.js') }}?v=1"></script>

    <!-- Auth utilities -->
    <script>
        const g = {
            jwt_claims: {
                email_verified: {{ user.email_verified | default(false) | tojson }}
            }
        };
    </script>
    <script src="{{ url_for('static', path='js/auth-utils.js') }}?v=1"></script>

    <!-- Verification check -->
    <script src="{{ url_for('static', path='js/verification-check.js') }}"></script>

    <!-- Check for verification success -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                // Show success notification
                if (typeof showNotification === 'function') {
                    showNotification('🎉 Email verified successfully! You can now create URLs and API keys.', 'success');
                }
                // Clean up URL
                const cleanUrl = window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
