<aside class="dashboard-sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="/" class="sidebar-brand">
            <span class="brand-logo">
                <img src="{{ url_for('static', path='images/logo-text-dark.png') }}" alt="spoo.me"
                    class="brand-logo-full">
                <img src="{{ url_for('static', path='images/favicon.png') }}" alt="spoo.me"
                    class="brand-logo-icon">
            </span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <i class="ti ti-layout-sidebar-left-collapse"></i>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="/dashboard/links" class="nav-item {% if request.path == '/dashboard/links' %}active{% endif %}"
            data-tooltip="Links">
            <i class="ti ti-link"></i>
            <span class="nav-text">Links</span>
        </a>

        <a href="/dashboard/keys" class="nav-item {% if request.path == '/dashboard/keys' %}active{% endif %}"
            data-tooltip="API Keys">
            <i class="ti ti-key"></i>
            <span class="nav-text">API Keys</span>
        </a>

        <a href="/dashboard/statistics"
            class="nav-item {% if request.path == '/dashboard/statistics' %}active{% endif %}"
            data-tooltip="Statistics">
            <i class="ti ti-chart-bar"></i>
            <span class="nav-text">Statistics</span>
        </a>

        {% if show_apps %}
        <a href="/dashboard/apps" class="nav-item {% if request.path == '/dashboard/apps' %}active{% endif %}"
            data-tooltip="Apps">
            <i class="ti ti-apps"></i>
            <span class="nav-text">Apps</span>
        </a>
        {% endif %}

        <a href="/dashboard/settings" class="nav-item {% if request.path == '/dashboard/settings' %}active{% endif %}"
            data-tooltip="Settings">
            <i class="ti ti-settings"></i>
            <span class="nav-text">Settings</span>
        </a>
    </nav>

    <div class="sidebar-bottom-links">
        <a href="/api" class="nav-item" target="_blank" data-tooltip="API Docs">
            <i class="ti ti-book"></i>
            <span class="nav-text">API Docs</span>
        </a>
        <a href="https://spoo.me/discord" class="nav-item" target="_blank" data-tooltip="Community">
            <i class="ti ti-brand-discord"></i>
            <span class="nav-text">Community</span>
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="profile-dropdown dropdown" data-dropdown>
            <button type="button" class="profile-button dropdown-trigger" id="profileButton"
                data-dropdown-trigger aria-label="Profile menu">
                <div class="profile-avatar">
                    {% if user.pfp and user.pfp.url %}
                    <img src="{{ user.pfp.url }}" alt="{{ user.user_name or user.email }}" class="profile-image"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <span class="profile-initials" style="display:none;">{{ (user.user_name or user.email)[:2]|upper
                        }}</span>
                    {% else %}
                    <span class="profile-initials">{{ (user.user_name or user.email)[:2]|upper }}</span>
                    {% endif %}
                </div>
                <div class="profile-info">
                    <span class="profile-name">{{ user.user_name or user.email }}</span>
                    <span class="profile-plan">{{ user.plan|capitalize }} Plan</span>
                </div>
                <i class="ti ti-chevron-up profile-chevron"></i>
            </button>

            <div class="profile-menu dropdown-menu" id="profileMenu" data-dropdown-menu>
                <a href="/dashboard/billing" class="menu-item dropdown-item">
                    <i class="ti ti-credit-card"></i>
                    <span>Billing</span>
                </a>
                <a href="/report" class="menu-item dropdown-item">
                    <i class="ti ti-report"></i>
                    <span>Report URL</span>
                </a>
                <a href="/contact" class="menu-item dropdown-item">
                    <i class="ti ti-help"></i>
                    <span>Help & Support</span>
                </a>
                <div class="menu-divider dropdown-divider"></div>
                <button type="button" class="menu-item dropdown-item" onclick="logout()">
                    <i class="ti ti-logout"></i>
                    <span>Sign out</span>
                </button>
            </div>
        </div>
    </div>
</aside>
